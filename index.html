<meta charset="utf-8" />
<title>ShyneShop</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root{
    color-scheme: dark;
    --bg:#0A0A0A; --bg2:#101012; --panel:#141416; --ink:#ECECEC; --muted:#7C7C82;
    --line:rgba(255,255,255,0.12); --line2:rgba(255,255,255,0.07);
    --red:#c7c5c0; --steel1:#3c4046; --steel2:#4a4e55;   /* was red — now neutral (monochrome) */
    --safe-top: env(safe-area-inset-top,0px);
    --safe-bottom: env(safe-area-inset-bottom,0px);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;background:var(--bg);}
  body{
    color:var(--ink);
    font-family:"Helvetica Neue",Arial,system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    overflow:hidden;
    -webkit-user-select:none;user-select:none;
  }
  .mono{font-family:"SF Mono",ui-monospace,"Roboto Mono","Courier New",monospace;}
  button{font-family:inherit;color:inherit;}
  ::-webkit-scrollbar{width:0;height:0;}

  .screen{position:fixed;inset:0;display:flex;flex-direction:column;opacity:0;visibility:hidden;transform:translateY(12px);
    transition:opacity .38s ease, transform .48s cubic-bezier(.2,.8,.2,1), visibility 0s linear .38s;}
  .screen.on{opacity:1;visibility:visible;transform:none;
    transition:opacity .38s ease, transform .48s cubic-bezier(.2,.8,.2,1), visibility 0s;}
  @media (prefers-reduced-motion: reduce){ .screen{transition:opacity .01s, visibility 0s;transform:none;} }

  /* ---- opening choreography ---- */
  @keyframes riseIn{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:none;}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes clipRise{from{clip-path:inset(0 0 100% 0);transform:translateY(10px);}to{clip-path:inset(0 0 -8% 0);transform:none;}}
  @keyframes glSettle{from{opacity:0;transform:scale(1.14);}to{opacity:1;transform:none;}}
  @keyframes photoReveal{from{clip-path:inset(0 0 100% 0);transform:scale(1.05);}to{clip-path:inset(0);transform:none;}}
  #entrance.on #gl{animation:glSettle 1.05s cubic-bezier(.2,.8,.2,1) both;}
  #entrance.on .wordmark{animation:clipRise .7s .12s cubic-bezier(.2,.8,.2,1) both;}
  #entrance.on .ent-meta{animation:fadeIn .6s .4s both;}
  #entrance.on .ent-cta button:nth-child(1){animation:riseIn .5s .5s cubic-bezier(.2,.8,.2,1) both;}
  #entrance.on .ent-cta button:nth-child(2){animation:riseIn .5s .58s cubic-bezier(.2,.8,.2,1) both;}
  #entrance.on .ent-cta button:nth-child(3){animation:riseIn .5s .66s cubic-bezier(.2,.8,.2,1) both;}
  #entrance.on .ent-hint{animation:fadeIn .7s .95s both;}
  #detail.on .carousel{animation:photoReveal .75s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-body>*:nth-child(1){animation:riseIn .55s .22s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-body>*:nth-child(2){animation:riseIn .55s .28s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-body>*:nth-child(3){animation:riseIn .55s .34s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-body>*:nth-child(4){animation:riseIn .55s .40s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-body>*:nth-child(5){animation:riseIn .55s .46s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-body>*:nth-child(6){animation:riseIn .55s .52s cubic-bezier(.2,.8,.2,1) both;}
  #detail.on .d-foot{animation:riseIn .5s .5s cubic-bezier(.2,.8,.2,1) both;}
  .grid .card{animation:riseIn .5s cubic-bezier(.2,.8,.2,1) both;}
  @media (prefers-reduced-motion: reduce){
    #entrance.on #gl,#entrance.on .wordmark,#entrance.on .ent-meta,#entrance.on .ent-cta button,#entrance.on .ent-hint,
    #detail.on .carousel,#detail.on .d-body>*,#detail.on .d-foot,.grid .card{animation:none;}
  }

  /* ---------------- ENTRANCE (fisheye) ---------------- */
  #bg,#gl{position:fixed;inset:0;width:100%;height:100%;display:block;}
  #gl{cursor:grab;touch-action:none;}
  #gl.drag{cursor:grabbing;}
  .grain{position:fixed;inset:0;pointer-events:none;opacity:0.045;mix-blend-mode:overlay;z-index:3;
    background-image:url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");}
  .ent-ui{position:fixed;inset:0;z-index:6;pointer-events:none;padding:calc(var(--safe-top) + clamp(16px,3vw,26px)) clamp(16px,3vw,26px) calc(var(--safe-bottom) + 18px);}
  .ent-ui>*{pointer-events:auto;}
  .wordmark{position:absolute;top:calc(var(--safe-top) + clamp(16px,3vw,26px));left:clamp(16px,3vw,26px);
    font-weight:700;font-size:clamp(19px,3vw,26px);letter-spacing:.34em;padding-left:.34em;text-transform:uppercase;line-height:1;}
  .ent-meta{position:absolute;top:calc(var(--safe-top) + clamp(16px,3vw,26px));right:clamp(16px,3vw,26px);
    text-align:right;font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);line-height:1.9;}
  .ent-meta b{color:var(--ink);font-weight:500;}
  .nums{position:absolute;left:50%;top:calc(var(--safe-top) + clamp(16px,3vw,26px));transform:translateX(-50%);
    font-size:9px;letter-spacing:.42em;color:rgba(255,255,255,.26);white-space:nowrap;}
  .ent-cta{position:absolute;left:50%;bottom:calc(var(--safe-bottom) + 24px);transform:translateX(-50%);
    display:flex;flex-wrap:wrap;gap:9px;justify-content:center;max-width:min(92vw,384px);}
  .ent-cta button{background:var(--ink);color:#0A0A0A;border:1px solid var(--ink);font-weight:700;font-size:11px;
    letter-spacing:.16em;text-transform:uppercase;padding:12px 18px;cursor:pointer;transition:.2s;white-space:nowrap;}
  .ent-cta button.ghost{background:transparent;color:var(--ink);}
  .ent-cta button:active{transform:translateY(1px);}
  .ent-hint{position:absolute;left:50%;bottom:calc(var(--safe-bottom) + 74px);transform:translateX(-50%);
    font-size:9.5px;letter-spacing:.3em;text-transform:uppercase;color:var(--muted);transition:opacity .6s;}
  .ent-hint.hide{opacity:0;}

  /* ---------------- CATALOG ---------------- */
  .top{position:sticky;top:0;z-index:5;background:linear-gradient(180deg,var(--bg) 70%,transparent);
    padding:calc(var(--safe-top) + 14px) 16px 10px;display:flex;flex-direction:column;gap:11px;}
  .bar{display:flex;align-items:center;gap:10px;}
  .bar .wm{font-weight:700;letter-spacing:.28em;text-transform:uppercase;font-size:16px;padding-left:.28em;}
  .icon-btn{margin-left:auto;width:38px;height:38px;border:1px solid var(--line);background:transparent;border-radius:2px;
    display:grid;place-items:center;cursor:pointer;color:var(--ink);flex:none;}
  .icon-btn svg{width:17px;height:17px;}
  .search{display:flex;align-items:center;gap:9px;border:1px solid var(--line);background:var(--bg2);padding:0 12px;height:42px;}
  .search svg{width:16px;height:16px;color:var(--muted);flex:none;}
  .search input{flex:1;background:none;border:none;outline:none;color:var(--ink);font-size:15px;letter-spacing:.01em;}
  .search input::placeholder{color:var(--muted);}
  .search .clr{color:var(--muted);cursor:pointer;font-size:18px;line-height:1;padding:4px;}

  .filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
  .chip{flex:none;border:1px solid var(--line);background:transparent;color:var(--muted);font-size:11px;
    letter-spacing:.08em;text-transform:uppercase;padding:8px 13px;cursor:pointer;white-space:nowrap;transition:.15s;border-radius:2px;}
  .chip.on{background:var(--ink);color:#0A0A0A;border-color:var(--ink);font-weight:600;}
  .chip.act{border-color:var(--muted);color:var(--ink);}

  .filt-row{display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
  .price{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px;}
  .price .lab{display:flex;justify-content:space-between;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);}
  .price .lab b{color:var(--ink);font-weight:600;}
  .rangewrap{position:relative;height:20px;}
  .rangewrap input[type=range]{position:absolute;left:0;top:0;width:100%;margin:0;pointer-events:none;-webkit-appearance:none;background:none;height:20px;}
  .rangewrap input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;pointer-events:auto;width:14px;height:14px;border-radius:50%;background:var(--ink);border:2px solid var(--bg);cursor:pointer;}
  .rangewrap input[type=range]::-moz-range-thumb{pointer-events:auto;width:14px;height:14px;border-radius:50%;background:var(--ink);border:2px solid var(--bg);cursor:pointer;}
  .rangewrap .track{position:absolute;left:0;right:0;top:9px;height:2px;background:var(--line);}
  .rangewrap .track .fill{position:absolute;height:100%;background:var(--ink);}
  .avail{display:flex;align-items:center;gap:8px;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);cursor:pointer;user-select:none;}
  .avail .box{width:34px;height:19px;border-radius:19px;background:var(--line);position:relative;transition:.2s;flex:none;}
  .avail .box::after{content:"";position:absolute;top:2px;left:2px;width:15px;height:15px;border-radius:50%;background:var(--muted);transition:.2s;}
  .avail.on .box{background:var(--ink);}
  .avail.on .box::after{left:17px;background:#0A0A0A;}
  .avail.on{color:var(--ink);}

  .count{font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding:0 2px;}
  .grid-scroll{flex:1;overflow-y:auto;padding:6px 16px calc(var(--safe-bottom) + 96px);-webkit-overflow-scrolling:touch;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;}
  @media(min-width:620px){.grid{grid-template-columns:repeat(3,1fr);}}
  .card{position:relative;cursor:pointer;background:var(--panel);border:1px solid var(--line2);overflow:hidden;}
  .card .ph{aspect-ratio:1/1;position:relative;display:grid;place-items:center;}
  .card .ph .mono-bg{font-family:Georgia,serif;font-weight:700;font-size:44px;color:rgba(255,255,255,.09);}
  .card.sold .ph{filter:grayscale(.75) brightness(.68);}
  .card .tag{position:absolute;top:8px;left:8px;font-size:8px;letter-spacing:.18em;text-transform:uppercase;
    background:rgba(0,0,0,.55);border:1px solid var(--line);padding:3px 6px;color:#cbb;}
  .card .adm{position:absolute;top:8px;right:8px;display:flex;gap:5px;}
  .card .adm button{width:26px;height:26px;border:1px solid var(--line);background:rgba(0,0,0,.6);border-radius:2px;display:grid;place-items:center;cursor:pointer;}
  .card .adm svg{width:12px;height:12px;color:var(--ink);}
  .card .info{padding:9px 10px 11px;border-top:1px solid var(--line2);}
  .card .info .br{font-size:9px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);}
  .card .info .nm{font-size:13px;margin:3px 0 6px;line-height:1.25;min-height:2.5em;}
  .card .info .pr{font-size:13px;font-weight:600;font-variant-numeric:tabular-nums;}
  .card .info .pr.sold{color:var(--red);font-weight:600;font-size:11px;letter-spacing:.1em;text-transform:uppercase;}
  .empty{padding:60px 20px;text-align:center;color:var(--muted);font-size:13px;letter-spacing:.05em;}

  /* ---------------- DETAIL ---------------- */
  #detail{background:var(--bg);z-index:20;}
  .d-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--safe-bottom) + 100px);}
  .d-head{position:absolute;top:0;left:0;right:0;z-index:4;display:flex;align-items:center;justify-content:space-between;
    padding:calc(var(--safe-top) + 12px) 14px 12px;pointer-events:none;}
  .d-head .back{pointer-events:auto;width:40px;height:40px;border:none;border-radius:50%;color:var(--ink);cursor:pointer;
    display:grid;place-items:center;background:rgba(10,10,10,.5);backdrop-filter:blur(8px);}
  .d-head .back svg{width:17px;height:17px;}
  .d-head .t{pointer-events:auto;font-size:9.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--ink);
    background:rgba(10,10,10,.5);backdrop-filter:blur(8px);padding:8px 12px;border-radius:20px;}
  .carousel{position:relative;background:#0b0b0d;}
  .slides{display:flex;overflow-x:auto;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;}
  .slide{flex:none;width:100%;aspect-ratio:1/1;scroll-snap-align:center;display:grid;place-items:center;position:relative;}
  .slide .mono-bg{font-family:Georgia,serif;font-weight:700;font-size:118px;color:rgba(255,255,255,.08);}
  .slide .pill{position:absolute;bottom:14px;right:14px;font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink);background:rgba(0,0,0,.42);padding:4px 9px;border-radius:20px;backdrop-filter:blur(4px);}
  .dots{position:absolute;left:0;right:0;bottom:13px;display:flex;gap:6px;justify-content:center;}
  .dots i{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.32);transition:.25s;}
  .dots i.on{background:var(--ink);width:20px;border-radius:3px;}

  .d-body{padding:24px 20px 0;}
  .d-body .br{font-size:10px;letter-spacing:.3em;text-transform:uppercase;color:var(--red);}
  .d-body h1{font-family:"Helvetica Neue",Arial,system-ui,sans-serif;font-weight:800;font-size:29px;margin:11px 0 0;letter-spacing:-.015em;line-height:1.05;text-wrap:balance;}
  .d-body h1::after{content:"";display:block;width:46px;height:2px;background:var(--ink);margin-top:15px;}
  .d-priceRow{display:flex;align-items:baseline;justify-content:space-between;gap:14px;margin-top:16px;padding-top:16px;border-top:1px solid var(--line2);}
  .d-body .pr{font-size:23px;font-variant-numeric:tabular-nums;letter-spacing:.01em;}
  .d-body .pr.sold{color:var(--red);font-size:15px;letter-spacing:.14em;text-transform:uppercase;}
  .trust{font-size:10px;letter-spacing:.13em;text-transform:uppercase;color:var(--muted);display:inline-flex;align-items:center;gap:7px;white-space:nowrap;}
  .trust::before{content:"";width:5px;height:5px;border-radius:50%;background:var(--muted);flex:none;}
  .specs{display:flex;flex-direction:column;margin:26px 0 6px;border-top:1px solid var(--line2);}
  .specs .s{display:flex;justify-content:space-between;align-items:baseline;gap:16px;padding:13px 0;border-bottom:1px solid var(--line2);}
  .specs .s .k{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--muted);}
  .specs .s .v{font-size:14px;color:var(--ink);text-align:right;}
  .sect{margin:28px 0;}
  .sect .h{font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--muted);margin-bottom:13px;
    display:flex;align-items:center;gap:12px;}
  .sect .h::after{content:"";flex:1;height:1px;background:var(--line2);}
  .sect p{margin:0;font-size:14.5px;line-height:1.66;color:#c9c9cd;}
  .brandcard{display:flex;gap:14px;align-items:flex-start;}
  .brandcard .mk{width:48px;height:48px;flex:none;border:1px solid var(--line);display:grid;place-items:center;font-family:Georgia,serif;font-weight:700;font-size:24px;color:var(--ink);}
  .dossier .d-row{display:flex;gap:14px;padding:12px 0;border-bottom:1px solid var(--line2);}
  .dossier .d-row:last-child{border-bottom:none;}
  .dossier .d-k{flex:none;width:100px;font-size:10px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted);padding-top:2px;}
  .dossier .d-v{flex:1;font-size:14px;line-height:1.55;color:#d2d2d6;}
  .d-foot{position:fixed;left:0;right:0;bottom:0;z-index:22;padding:14px 16px calc(var(--safe-bottom) + 16px);
    background:linear-gradient(0deg,var(--bg) 74%,transparent);display:flex;gap:10px;}
  .d-foot .buy{flex:1;border:1px solid var(--ink);background:var(--ink);color:#0A0A0A;font-weight:700;font-size:12px;
    letter-spacing:.2em;text-transform:uppercase;padding:16px;cursor:pointer;transition:.2s;}
  .d-foot .buy:active{transform:translateY(1px);}
  .d-foot .buy[disabled]{background:transparent;color:var(--muted);border-color:var(--line);cursor:not-allowed;}
  /* wide / desktop: lay photos out in a row across the width, cap the text column */
  @media (min-width:760px){
    .carousel{padding-top:8px;}
    .slides{scroll-snap-type:none; gap:2px; justify-content:safe center; padding:0 8px;}
    .slide{flex:0 0 auto; width:auto; height:min(62vh,540px); aspect-ratio:1/1;}
    .slide .mono-bg{font-size:150px;}
    .dots{display:none;}
    .d-body{max-width:720px; margin-left:auto; margin-right:auto; width:100%;}
    .d-foot{left:50%; right:auto; transform:translateX(-50%); width:100%; max-width:720px;}
  }

  /* ---------------- ADMIN / MODAL ---------------- */
  .fab{position:fixed;right:16px;bottom:calc(var(--safe-bottom) + 18px);z-index:8;width:54px;height:54px;border-radius:50%;
    background:var(--ink);border:none;color:#0A0A0A;font-size:26px;line-height:1;cursor:pointer;box-shadow:0 8px 24px rgba(0,0,0,.5);display:none;}
  .fab.on{display:grid;place-items:center;}
  .modal{position:fixed;inset:0;z-index:40;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);display:none;align-items:flex-end;justify-content:center;}
  .modal.on{display:flex;}
  .sheet{width:100%;max-width:560px;max-height:92vh;overflow-y:auto;background:var(--bg2);border:1px solid var(--line);
    border-bottom:none;border-radius:12px 12px 0 0;padding:18px 18px calc(var(--safe-bottom) + 18px);}
  .sheet h2{margin:2px 0 16px;font-size:16px;letter-spacing:.02em;font-weight:600;display:flex;justify-content:space-between;align-items:center;}
  .sheet h2 .x{cursor:pointer;color:var(--muted);font-size:24px;line-height:1;}
  .field{margin-bottom:13px;}
  .field label{display:block;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:6px;}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--line);color:var(--ink);
    font:inherit;font-size:15px;padding:11px 12px;outline:none;border-radius:2px;}
  .field textarea{resize:vertical;min-height:70px;line-height:1.5;}
  .field input[type=file]{padding:9px;font-size:12px;color:var(--muted);}
  .photos{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:9px;}
  .photos:empty{display:none;}
  .thumb{position:relative;width:60px;height:60px;border-radius:3px;background-size:cover;background-position:center;border:1px solid var(--line);}
  .thumb button{position:absolute;top:-7px;right:-7px;width:20px;height:20px;border-radius:50%;border:1px solid var(--line);background:rgba(0,0,0,.72);color:#fff;font-size:13px;line-height:1;cursor:pointer;}
  .field.two{display:flex;gap:10px;}.field.two>div{flex:1;}
  .sheet .save{width:100%;margin-top:6px;background:var(--ink);color:#0A0A0A;border:none;font-weight:700;font-size:12px;
    letter-spacing:.18em;text-transform:uppercase;padding:14px;cursor:pointer;}
  .sheet .del{width:100%;margin-top:9px;background:transparent;color:var(--red);border:1px solid var(--red);font-weight:600;
    font-size:11px;letter-spacing:.16em;text-transform:uppercase;padding:12px;cursor:pointer;}
  .sheet .reset{width:100%;margin-top:9px;background:transparent;color:var(--muted);border:1px solid var(--line);font-size:10px;
    letter-spacing:.14em;text-transform:uppercase;padding:10px;cursor:pointer;}
  .adm-badge{position:fixed;left:16px;bottom:calc(var(--safe-bottom) + 34px);z-index:8;font-size:9px;letter-spacing:.2em;
    text-transform:uppercase;color:var(--red);border:1px solid var(--red);padding:5px 9px;display:none;pointer-events:none;}
  .adm-badge.on{display:block;}
  .toast{position:fixed;left:50%;bottom:calc(var(--safe-bottom) + 90px);transform:translateX(-50%) translateY(20px);z-index:60;
    background:var(--ink);color:#0A0A0A;font-size:12px;font-weight:600;letter-spacing:.04em;padding:11px 18px;border-radius:3px;
    opacity:0;transition:.3s;pointer-events:none;}
  .toast.on{opacity:1;transform:translateX(-50%) translateY(0);}
</style>

<!-- ==================== ENTRANCE ==================== -->
<section class="screen on" id="entrance">
  <canvas id="bg"></canvas>
  <canvas id="gl"></canvas>
  <div class="grain"></div>
  <div class="ent-ui">
    <div class="wordmark">Shyne</div>
    <div class="ent-meta"><b>В наличии в Санкт-Петербурге</b><br/>Доставка по всей России</div>
    <div class="ent-hint" id="entHint">тяни — рассмотри витрину</div>
    <div class="ent-cta">
      <button id="toCatalog">В каталог</button>
      <button class="ghost" id="entSearch">Поиск</button>
      <button class="ghost" id="entSeller">Написать продавцу</button>
    </div>
  </div>
</section>

<!-- ==================== CATALOG ==================== -->
<section class="screen" id="catalog">
  <div class="top">
    <div class="bar">
      <span class="wm">Shyne</span>
      <button class="icon-btn" id="catHome" title="На главную">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 11l9-8 9 8"/><path d="M5 10v10h14V10"/></svg>
      </button>
    </div>
    <div class="search">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>

      <div class="price">

<!-- ==================== DETAIL ==================== -->
<section class="screen" id="detail">
  <div class="d-scroll">
    <div class="d-head">
      <button class="back" id="dBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7"><path d="M15 5l-7 7 7 7"/></svg></button>
      <span class="t mono" id="dId">№ 00</span>
    </div>
    <div class="carousel">
      <div class="slides" id="slides"></div>
      <div class="dots" id="dots"></div>
    </div>
    <div class="d-body">
      <div class="br" id="dBrand">—</div>
      <h1 id="dName">—</h1>

        <div class="pr" id="dPrice">—</div>
        <div class="trust">Строго оригинал · проверки</div>
      </div>

      <div class="specs" id="dSpecs"></div>

      <div class="sect" id="dDescSect">
        <div class="h">Описание</div>
        <p id="dDesc">—</p>
      </div>

      <div class="sect" id="dDossierSect">
        <div class="h">Досье</div>

      </div>

        <div class="h">О бренде</div>
        <div class="brandcard">
          <div class="mk" id="dBrandMk">G</div>
          <p id="dBrandInfo">—</p>
        </div>
      </div>
    </div>
  </div>
  <div class="d-foot">
    <button class="buy" id="dBuy">Написать в лс</button>
  </div>
</section>

<!-- ==================== ADMIN MODAL ==================== -->
<div class="modal" id="modal">
  <div class="sheet">
    <h2><span id="mTitle">Новый товар</span><span class="x" id="mClose">&times;</span></h2>
    <div class="field"><label>Бренд</label><input id="fBrand" list="brandList" placeholder="Gucci"/><datalist id="brandList"></datalist></div>
    <div class="field"><label>Название</label><input id="fName" placeholder="Поло Snake"/></div>
    <div class="field two">
      <div><label>Цена, ₽</label><input id="fPrice" type="number" inputmode="numeric" placeholder="18490"/></div>
      <div><label>Размер</label><input id="fSize" placeholder="L / 48"/></div>
    </div>
    <div class="field two">
      <div><label>Категория</label><select id="fCat"></select></div>
      <div><label>Статус</label><select id="fStatus"><option value="in">В наличии</option><option value="sold">Продано</option></select></div>
    </div>
    <div class="field"><label>Состояние</label><input id="fCond" placeholder="9/10, без дефектов"/></div>
    <div class="field two">
      <div><label>Год</label><input id="fYear" placeholder="2016"/></div>
      <div><label>Коллекция</label><input id="fColl" placeholder="Gucci SS16"/></div>
    </div>
    <div class="field"><label>Описание</label><textarea id="fDesc" placeholder="Детали, посадка, комплект…"></textarea></div>
    <div class="field"><label>О бренде (коротко)</label><textarea id="fBrandInfo" placeholder="Основан…"></textarea></div>
    <div class="field"><label>Фото</label><div class="photos" id="fPhotoList"></div><input id="fPhotos" type="file" accept="image/*" multiple/></div>
    <button class="save" id="mSave">Сохранить</button>
    <button class="del" id="mDel" style="display:none">Удалить товар</button>
    <button class="reset" id="mReset">Обновить из базы</button>
  </div>
</div>

function load(cb){

    sb.from("products").select("*").order("sort",{ascending:true}).order("id",{ascending:true}).then(function(res){
      if(res.error){ console.warn("Supabase load error:", res.error.message); if(!products.length) products=demoProducts(); }
      else { products = (res.data||[]).map(fromRow); }
      cb && cb();
    });

/* ---------------- filters state ---------------- */
var state={q:"",brands:{},avail:false,pmin:0,pmax:0,lo:0,hi:0};
function priceBounds(){
  var lo=Infinity,hi=0; products.forEach(function(p){ lo=Math.min(lo,p.price); hi=Math.max(hi,p.price); });
  if(lo===Infinity){lo=0;hi=0;}
  state.lo=lo; state.hi=hi;
  if(state.pmin<lo||state.pmin===0) state.pmin=lo;
  if(state.pmax>hi||state.pmax===0) state.pmax=hi;
  state.pmin=Math.max(lo,Math.min(state.pmin,hi));
  state.pmax=Math.max(lo,Math.min(state.pmax,hi));
}
function activeBrandList(){ var s={}; products.forEach(function(p){ s[p.brand]=1; }); return Object.keys(s).sort(); }

function renderChips(){
  var wrap=byId("brandChips"); wrap.innerHTML="";
  activeBrandList().forEach(function(b){
    var c=document.createElement("button");
    c.className="chip"+(state.brands[b]?" on":"");
    c.textContent=b;
    c.onclick=function(){ if(state.brands[b]) delete state.brands[b]; else state.brands[b]=1; renderChips(); renderGrid(); };
    wrap.appendChild(c);
  });
}
function setupRange(){
  priceBounds();
  var rMin=byId("rMin"),rMax=byId("rMax");
  [rMin,rMax].forEach(function(r){ r.min=state.lo; r.max=state.hi; r.step=Math.max(1,Math.round((state.hi-state.lo)/100)); });
  rMin.value=state.pmin; rMax.value=state.pmax;
  syncRange();
  rMin.oninput=function(){ state.pmin=Math.min(+rMin.value, state.pmax-1); rMin.value=state.pmin; syncRange(); renderGrid(); };
  rMax.oninput=function(){ state.pmax=Math.max(+rMax.value, state.pmin+1); rMax.value=state.pmax; syncRange(); renderGrid(); };
}
function syncRange(){
  byId("pMin").textContent=Number(state.pmin).toLocaleString("ru-RU");
  byId("pMax").textContent=Number(state.pmax).toLocaleString("ru-RU");
  var span=state.hi-state.lo||1;
  var a=(state.pmin-state.lo)/span*100, b=(state.pmax-state.lo)/span*100;
  var f=byId("pFill"); f.style.left=a+"%"; f.style.width=(b-a)+"%";
}

function filtered(){
  var q=state.q.trim().toLowerCase();
  var bk=Object.keys(state.brands);
  return products.filter(function(p){
    if(q){ if((p.brand+" "+p.name).toLowerCase().indexOf(q)<0) return false; }
    if(bk.length && !state.brands[p.brand]) return false;
    if(state.avail && p.status==="sold") return false;
    if(p.price<state.pmin||p.price>state.pmax) return false;
    return true;
  });
}

      '</div>'+

        (p.status==="sold"?'<div class="pr sold">Продано</div>':'<div class="pr">'+fmt(p.price)+'</div>')+'</div>';

function plural(n,a,b,c){ n=Math.abs(n)%100; var n1=n%10; if(n>10&&n<20)return c; if(n1>1&&n1<5)return b; if(n1===1)return a; return c; }

function uploadPhotos(files){
  var jobs=[];
  for(var i=0;i<files.length;i++){ jobs.push(uploadOne(files[i])); }
  return Promise.all(jobs).then(function(urls){ return urls.filter(Boolean); });
}
function uploadOne(f){
  if(CLD_CLOUD && CLD_PRESET){
    var fd=new FormData(); fd.append("file",f); fd.append("upload_preset",CLD_PRESET);
    return fetch("https://api.cloudinary.com/v1_1/"+CLD_CLOUD+"/image/upload",{method:"POST",body:fd})
      .then(function(r){ return r.json(); })
      .then(function(j){ if(j && j.secure_url) return j.secure_url; console.warn("cloudinary:",j); return null; })
      .catch(function(e){ console.warn("cloudinary error",e); return null; });
  }
  // fallback: Supabase Storage
  var ext=(f.name.split(".").pop()||"jpg").toLowerCase().replace(/[^a-z0-9]/g,"")||"jpg";
  var path=Date.now()+"_"+Math.random().toString(36).slice(2,8)+"."+ext;
  return sb.storage.from("product-photos").upload(path,f,{contentType:f.type||undefined}).then(function(up){
    if(up.error){ console.warn("upload:",up.error.message); return null; }
    return sb.storage.from("product-photos").getPublicUrl(path).data.publicUrl;
  });
}

function saveForm(){
  var brand=byId("fBrand").value.trim(), name=byId("fName").value.trim(), price=parseInt(byId("fPrice").value,10);
  if(!brand||!name||!(price>0)){ toast("Бренд, название и цена обязательны"); return; }
  var wasEditing=editing;
  var data={brand:brand,name:name,price:price,size:byId("fSize").value.trim(),cond:byId("fCond").value.trim(),
    cat:byId("fCat").value,status:byId("fStatus").value,desc:byId("fDesc").value.trim(),brandInfo:byId("fBrandInfo").value.trim(),
    year:byId("fYear").value.trim(),collection:byId("fColl").value.trim(),
    hue:BRAND_HUE[brand]||"#202024"};
  var files=byId("fPhotos").files;
  var btn=byId("mSave"); btn.disabled=true; btn.textContent="Сохраняю…";
  function done(msg){ btn.disabled=false; btn.textContent="Сохранить"; closeForm(); afterDataChange(); toast(msg); }
  function fail(e){ btn.disabled=false; btn.textContent="Сохранить"; toast("Ошибка: "+((e&&e.message)||e)); console.warn(e); }
  (sb && files && files.length ? uploadPhotos(files) : Promise.resolve([])).then(function(newUrls){
    data.photos = formPhotos.concat(newUrls);
    if(sb){
      var q = wasEditing ? sb.from("products").update(toRow(data)).eq("id",wasEditing.id)
                         : sb.from("products").insert(toRow(data));
      return q.then(function(res){
        if(res.error) return fail(res.error);
        load(function(){ done(wasEditing?"Сохранено":"Товар добавлен"); });
      });
    } else {
      if(wasEditing){ Object.assign(wasEditing,data); } else { data.id=Date.now(); products.unshift(data); }
      done(wasEditing?"Сохранено":"Товар добавлен");
    }
  }).catch(fail);
}

function drawStore(){

  var x=bgCanvas.getContext("2d"); x.setTransform(dpr,0,0,dpr,0,0);

    var iw=bgImg.naturalWidth, ih=bgImg.naturalHeight, sc=Math.max(w/iw,h/ih);
    var dw=iw*sc, dh=ih*sc;
    try{ x.filter="grayscale(0.25) brightness(0.72) contrast(1.05)"; }catch(_e){}
    x.drawImage(bgImg,(w-dw)/2,(h-dh)/2,dw,dh);

    var ov=x.createRadialGradient(w/2,h/2,Math.min(w,h)*0.25,w/2,h/2,Math.max(w,h)*0.75);
    ov.addColorStop(0,"rgba(0,0,0,0)"); ov.addColorStop(1,"rgba(0,0,0,0.6)");
    x.fillStyle=ov; x.fillRect(0,0,w,h);

  vg.addColorStop(.62,"#181a1f"); vg.addColorStop(.66,"#0e0f12"); vg.addColorStop(1,"#050506");
  x.fillStyle=vg; x.fillRect(0,0,w,h);
  // brushed steel panel (back wall)
  var sx=w*0.30, sw=w*0.40, sy=h*0.15, sh=h*0.50;
  var mg=x.createLinearGradient(sx,0,sx+sw,0);
  mg.addColorStop(0,"#2a2d33"); mg.addColorStop(.32,"#3c4046"); mg.addColorStop(.52,"#4a4e55"); mg.addColorStop(.72,"#33363c"); mg.addColorStop(1,"#26282d");
  x.save(); x.globalAlpha=.92; x.fillStyle=mg; x.fillRect(sx,sy,sw,sh);

    var yy=sy+Math.random()*sh; x.moveTo(sx,yy); x.lineTo(sx+sw,yy+(Math.random()*10-5)); x.stroke(); }
  x.restore();
  // concrete blotches on side walls
  for(var b=0;b<40;b++){ var bx=Math.random()<.5?Math.random()*sx:sx+sw+Math.random()*(w-sx-sw);
    var by=Math.random()*h*0.66, br=30+Math.random()*90; var rg=x.createRadialGradient(bx,by,0,bx,by,br);
    rg.addColorStop(0,"rgba(255,255,255,"+(Math.random()*0.02)+")"); rg.addColorStop(1,"rgba(0,0,0,0)");
    x.fillStyle=rg; x.beginPath(); x.arc(bx,by,br,0,7); x.fill(); }
  // ceiling spotlights + beams
  for(var k=0;k<7;k++){ var lx=(k+0.5)/7*w, ly=h*0.05;
    var g=x.createRadialGradient(lx,ly,0,lx,ly,120); g.addColorStop(0,"rgba(255,255,255,0.14)"); g.addColorStop(1,"rgba(255,255,255,0)");
    x.fillStyle=g; x.beginPath(); x.arc(lx,ly,120,0,7); x.fill();
    var beam=x.createLinearGradient(lx,ly,lx,h*0.62); beam.addColorStop(0,"rgba(255,255,255,0.05)"); beam.addColorStop(1,"rgba(255,255,255,0)");
    x.save(); x.globalAlpha=.7; x.fillStyle=beam; x.beginPath(); x.moveTo(lx-8,ly); x.lineTo(lx+8,ly); x.lineTo(lx+70,h*0.62); x.lineTo(lx-70,h*0.62); x.closePath(); x.fill(); x.restore(); }
  // floor reflection of steel
  var fy=h*0.66; var fr=x.createLinearGradient(0,fy,0,h);
  fr.addColorStop(0,"rgba(90,95,105,0.16)"); fr.addColorStop(.5,"rgba(60,64,72,0.05)"); fr.addColorStop(1,"rgba(0,0,0,0)");
  x.save(); x.globalAlpha=.8; x.fillStyle=fr; x.fillRect(sx-10,fy,sw+20,h-fy);

"void main(){",
" float asp=uRes.x/uRes.y;",
" vec2 uv=gl_FragCoord.xy/uRes; vec2 c=uv-0.5; c.x*=asp;",
" float R=length(vec2(0.5*asp,0.5));",           // half-diagonal -> normalize

" float warp=1.0+uK*rn*rn;",                      // lens strength now aspect-independent
" vec2 world=c*warp*uZoom+uPan;",
" vec2 cell=floor(world); vec2 f=fract(world);",

  var CELL=300, cv=document.createElement("canvas"); cv.width=cv.height=atlasAC*CELL;
  var x=cv.getContext("2d");
  x.fillStyle="#0a0a0b"; x.fillRect(0,0,cv.width,cv.height);
  items.forEach(function(p,i){
    var c=i%atlasAC, rr=(i/atlasAC|0), ox=c*CELL, oy=rr*CELL;
    var pu=p.photos&&p.photos[0], pim=pu?photoCache[pu]:null;
    if(pim && pim.naturalWidth){
      // real product photo, centre-cropped to square + "liquid glass" darkening for legibility
      var iw=pim.naturalWidth, ih=pim.naturalHeight, ss=Math.min(iw,ih);
      x.drawImage(pim,(iw-ss)/2,(ih-ss)/2,ss,ss,ox,oy,CELL,CELL);
      x.fillStyle="rgba(9,9,11,0.42)"; x.fillRect(ox,oy,CELL,CELL);
      var gg=x.createLinearGradient(ox,oy,ox,oy+CELL);
      gg.addColorStop(0,"rgba(255,255,255,0.06)"); gg.addColorStop(0.45,"rgba(0,0,0,0)"); gg.addColorStop(1,"rgba(0,0,0,0.5)");
      x.fillStyle=gg; x.fillRect(ox,oy,CELL,CELL);
    } else {
      // placeholder swatch (gradient + brushed streaks)
      var hue=p.hue||"#202024";
      var g=x.createLinearGradient(ox,oy,ox+CELL,oy+CELL);
      g.addColorStop(0,hue); g.addColorStop(1,"#0b0b0d"); x.fillStyle=g; x.fillRect(ox,oy,CELL,CELL);
      x.save(); x.beginPath(); x.rect(ox,oy,CELL,CELL); x.clip();
      for(var s=0;s<30;s++){ x.strokeStyle="rgba(255,255,255,"+(Math.random()*0.03)+")"; x.beginPath(); var yy=oy+Math.random()*CELL; x.moveTo(ox,yy); x.lineTo(ox+CELL,yy+(Math.random()*16-8)); x.stroke(); }
      x.restore();
    }
    // shared label over ANY tile (photo or swatch): frame, index, brand, name, price, sold
    x.strokeStyle="rgba(255,255,255,0.12)"; x.strokeRect(ox+8.5,oy+8.5,CELL-17,CELL-17);
    x.fillStyle="rgba(255,255,255,0.42)"; x.font="600 14px 'SF Mono',monospace"; x.textAlign="left"; x.textBaseline="top"; x.fillText(("0"+p.id).slice(-2),ox+20,oy+20);
    // bottom-left label: brand eyebrow / product name / price
    x.textAlign="left"; x.textBaseline="alphabetic";
    x.fillStyle="rgba(236,236,236,0.58)"; x.font="600 11px 'Helvetica Neue',Arial,sans-serif"; x.fillText(p.brand.toUpperCase(),ox+20,oy+CELL-48);
    x.fillStyle="#EDEDED"; x.font="600 15px 'Helvetica Neue',Arial,sans-serif"; x.fillText(p.name,ox+20,oy+CELL-28);
    x.fillStyle="rgba(236,236,236,0.9)"; x.font="600 14px 'SF Mono',monospace"; x.fillText(p.status==="sold"?"Продано":fmt(p.price),ox+20,oy+CELL-11);
    if(p.status==="sold"){ x.save(); x.translate(ox+CELL/2,oy+CELL/2); x.rotate(-0.17);
      x.strokeStyle="rgba(236,236,236,0.85)"; x.lineWidth=2; x.strokeRect(-88,-24,176,48);
      x.fillStyle="rgba(236,236,236,0.92)"; x.font="700 22px 'Helvetica Neue',Arial,sans-serif"; x.textAlign="center"; x.textBaseline="middle"; x.fillText("ПРОДАНО",0,2); x.restore(); }
  });
  return cv;
}

function initGL(){
  gl=glCanvas.getContext("webgl",{antialias:true,alpha:true,premultipliedAlpha:false});
  if(!gl){ byId("gl").style.display="none"; return false; }
  function sh(t,src){ var s=gl.createShader(t); gl.shaderSource(s,src); gl.compileShader(s); if(!gl.getShaderParameter(s,gl.COMPILE_STATUS))throw gl.getShaderInfoLog(s); return s; }
  prog=gl.createProgram(); gl.attachShader(prog,sh(gl.VERTEX_SHADER,VERT)); gl.attachShader(prog,sh(gl.FRAGMENT_SHADER,FRAG)); gl.linkProgram(prog); gl.useProgram(prog);
  var buf=gl.createBuffer(); gl.bindBuffer(gl.ARRAY_BUFFER,buf); gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1,3,-1,-1,3]),gl.STATIC_DRAW);
  var loc=gl.getAttribLocation(prog,"p"); gl.enableVertexAttribArray(loc); gl.vertexAttribPointer(loc,2,gl.FLOAT,false,0,0);
  tex=gl.createTexture();
  gl.enable(gl.BLEND); gl.blendFunc(gl.SRC_ALPHA,gl.ONE_MINUS_SRC_ALPHA); gl.clearColor(0,0,0,0);

  gl.uniform1f(U.zoom,ZOOM); gl.uniform1f(U.k,K); gl.uniform1f(U.gap,GAP);
  glReady=true; return true;
}
function u(n){ return gl.getUniformLocation(prog,n); }
function uploadAtlas(){
  if(!glReady) return;
  gl.bindTexture(gl.TEXTURE_2D,tex); gl.pixelStorei(gl.UNPACK_FLIP_Y_WEBGL,true);
  gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,buildAtlasCanvas());
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
  gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE); gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);

}
function resizeGL(){
  if(!glReady) return;
  glCanvas.width=Math.floor(window.innerWidth*dpr); glCanvas.height=Math.floor(window.innerHeight*dpr);
  gl.viewport(0,0,glCanvas.width,glCanvas.height); gl.uniform2f(U.res,glCanvas.width,glCanvas.height);
  ZOOM=computeZoom(); gl.uniform1f(U.zoom,ZOOM);
}
function startGL(){
  drawStore();
  if(!glReady){ if(!initGL()) return; resizeGL(); }
  if(glDirty){ uploadAtlas(); glDirty=false; }
  resizeGL();
  preloadAtlasPhotos();   // load real product photos -> atlas re-uploads when each is ready
  if(!rafId) rafId=requestAnimationFrame(frame);
}
function stopGL(){ if(rafId){ cancelAnimationFrame(rafId); rafId=0; } }
function frame(now){
  if(current!=="entrance"){ rafId=0; return; }
  if(!drag){ pan.x+=vel.x; pan.y+=vel.y; vel.x*=0.94; vel.y*=0.94;
    if(!reduce && Math.abs(vel.x)<1e-4 && Math.abs(vel.y)<1e-4){ var t=(now-t0)/1000; pan.x+=Math.cos(t*0.15)*0.0015; pan.y+=Math.sin(t*0.11)*0.0015; } }
  gl.clear(gl.COLOR_BUFFER_BIT); gl.uniform2f(U.pan,pan.x,pan.y); gl.drawArrays(gl.TRIANGLES,0,3);
  rafId=requestAnimationFrame(frame);
}
function wpp(){ return ZOOM/window.innerHeight; }
glCanvas.addEventListener("pointerdown",function(e){ drag=true;moved=false; last.x=down.x=e.clientX; last.y=down.y=e.clientY; vel.x=vel.y=0; glCanvas.classList.add("drag"); try{glCanvas.setPointerCapture(e.pointerId);}catch(_){} });
glCanvas.addEventListener("pointermove",function(e){ if(!drag)return; var k=wpp(); var dx=(e.clientX-last.x)*k, dy=(e.clientY-last.y)*k; pan.x-=dx; pan.y+=dy; vel.x=-dx; vel.y=dy; last.x=e.clientX; last.y=e.clientY; if(Math.abs(e.clientX-down.x)+Math.abs(e.clientY-down.y)>6)moved=true; byId("entHint").classList.add("hide"); });
function endDrag(){ if(!drag)return; drag=false; glCanvas.classList.remove("drag"); if(!moved) pickAt(down.x,down.y); }
glCanvas.addEventListener("pointerup",endDrag); glCanvas.addEventListener("pointercancel",endDrag);
function pickAt(sx,sy){
  var w=window.innerWidth,h=window.innerHeight, asp=w/h;
  var cx=sx/w-0.5, cy=(1-sy/h)-0.5; cx*=asp;
  var R=Math.hypot(0.5*asp,0.5);
  var r=Math.hypot(cx,cy), rn=r/R, warp=1+K*rn*rn;
  var wx=cx*warp*ZOOM+pan.x, wy=cy*warp*ZOOM+pan.y;
  var cellx=Math.floor(wx), celly=Math.floor(wy);
  var idx=(((cellx*5+celly*13)%atlasN)+atlasN)%atlasN;   // same formula as the shader
  var p=products[idx];
  if(p) openDetail(p);
}
window.addEventListener("resize",function(){ if(current==="entrance"){ drawStore(); resizeGL(); } dpr=Math.min(window.devicePixelRatio||1,2); });

// boot
show("entrance");
load(function(){
  afterDataChange();                       // renders grid/chips/range, marks atlas dirty
  applyAdmin();
  if(current==="entrance"){ glDirty=true; startGL(); }   // rebuild fisheye atlas with loaded items
});

})();
